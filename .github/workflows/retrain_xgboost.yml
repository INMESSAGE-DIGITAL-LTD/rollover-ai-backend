# .github/workflows/retrain_xgboost.yml
#
# Runs every Monday at 06:00 UTC.
# Steps:
#   1. Download fresh historical data from football-data.co.uk (FREE)
#   2. Build training CSV with implied probs + labels
#   3. Retrain XGBoost for each target market
#   4. Commit updated models + league_stats.json back to this repo
#   5. Render detects the push and auto-redeploys the backend
#
# Required GitHub Secrets:
#   None required -- football-data.co.uk needs no auth key.
#   (Optional) RENDER_DEPLOY_HOOK_URL -- trigger Render deploy immediately

name: Retrain XGBoost

permissions:
  contents: write

on:
  schedule:
    - cron: "0 6 * * 1"         # Every Monday 06:00 UTC
  workflow_dispatch:             # Allow manual trigger from GitHub UI

jobs:
  retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install \
            xgboost \
            scikit-learn \
            pandas \
            numpy \
            requests \
            joblib \
            firebase-admin

      - name: Fetch historical data & compute league DNA
        run: |
          python football_data_fetcher.py --update --build-training
          echo "=== League stats summary ==="
          python football_data_fetcher.py --stats

      - name: Retrain XGBoost models
        run: |
          python train_xgboost.py \
            --input data/training_data.csv \
            --output models/ \
            --targets over15 over25 over35 under25 under35 btts home_win

      - name: Smoke test new models
        run: |
          python -c "
          import joblib, pandas as pd, pathlib

          FEATURE_COLS = [
              'implied_home', 'implied_draw', 'implied_away',
              'implied_over25', 'implied_under25',
              'league_over25_rate', 'league_over15_rate', 'league_btts_rate',
              'league_avg_goals', 'league_home_win_rate',
              'league_is_high_scoring', 'league_is_low_scoring',
          ]

          models_dir = pathlib.Path('models')
          assert (models_dir / 'xgb_over25.joblib').exists(), 'over25 model missing'
          assert (models_dir / 'xgb_under25.joblib').exists(), 'under25 model missing'
          assert (models_dir / 'xgb_btts.joblib').exists(), 'btts model missing'

          # Build a dummy feature row (all zeros) -- just verifies model loads and runs
          dummy = pd.DataFrame([{c: 0.5 for c in FEATURE_COLS}])
          for target in ['over25', 'under25', 'btts', 'home_win']:
              model = joblib.load(models_dir / f'xgb_{target}.joblib')
              prob = model.predict_proba(dummy)[0][1]
              print(f'  {target}: prob={prob:.3f}')
          print('Smoke test passed.')
          "

      - name: Evaluate models on holdout set
        run: |
          python evaluate_models.py --data data/training_data.csv --models models/
        continue-on-error: true

      - name: Commit updated models and stats
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add models/*.joblib || true
          git add data/league_stats.json || true

          if git diff --cached --quiet; then
            echo "No model changes -- skipping commit"
          else
            git commit -m "chore: retrain XGBoost $(date -u '+%Y-%m-%d')"
            git push
          fi

      - name: Trigger Render deploy
        env:
          RENDER_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        if: ${{ env.RENDER_HOOK != '' }}
        run: |
          curl -s -X POST "$RENDER_HOOK"
          echo "Render deploy triggered."
