name: Bi-Weekly Model Retraining

permissions:
  contents: write

# Runs every 14 days (1st and 15th of each month) at 02:00 UTC.
# Also manually triggerable from the GitHub Actions tab.
on:
  schedule:
    - cron: '0 2 1,15 * *'
  workflow_dispatch:
    inputs:
      days:
        description: 'Number of past days to collect (default: 30)'
        required: false
        default: '30'

jobs:
  retrain:
    name: Collect data and retrain XGBoost models
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install ML dependencies
        run: |
          pip install --upgrade pip
          pip install pandas numpy "scikit-learn>=1.3.0" "xgboost>=2.0.0,<3.0.0"

      # Write Firebase credentials — check done in shell, not YAML if:
      # (secrets context is not available in GitHub Actions if: expressions)
      - name: Write Firebase service account
        env:
          FIREBASE_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -n "$FIREBASE_SA" ]; then
            printf '%s' "$FIREBASE_SA" > /tmp/firebase_sa.json
            echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase_sa.json" >> $GITHUB_ENV
            echo "Firebase credentials written."
          else
            echo "FIREBASE_SERVICE_ACCOUNT secret not set — skipping."
          fi

      - name: Collect recent match results from SportMonks
        continue-on-error: true
        env:
          SPORTMONKS_TOKEN: ${{ secrets.SPORTMONKS_API_KEY }}
        run: |
          DAYS="${{ github.event.inputs.days || '30' }}"
          echo "Collecting last $DAYS days of results..."
          python scripts/collect_recent_results.py --days "$DAYS"

      - name: Retrain XGBoost models
        run: |
          echo "Retraining models..."
          cd scripts && python train.py

      - name: Check for changes
        id: changes
        run: |
          git add models/trained/ data/raw/all_matches.csv
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No model or data changes — skipping commit."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected — will commit."
          fi

      - name: Commit updated models and data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          DATE=$(date -u '+%Y-%m-%d')
          git commit -m "chore: retrain models with results up to $DATE [skip ci]"

      - name: Push to main
        if: steps.changes.outputs.changed == 'true'
        run: git push origin main
