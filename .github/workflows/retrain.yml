name: Bi-Weekly Model Retraining

# Runs every 14 days (1st and 15th of each month) at 02:00 UTC.
# Also manually triggerable from the GitHub Actions tab.
on:
  schedule:
    - cron: '0 2 1,15 * *'
  workflow_dispatch:
    inputs:
      days:
        description: 'Number of past days to collect (default: 30)'
        required: false
        default: '30'

jobs:
  retrain:
    name: Collect data and retrain XGBoost models
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Use a PAT so the push step can trigger Render auto-deploy
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install ML dependencies
        run: |
          pip install --upgrade pip
          pip install pandas numpy scikit-learn "xgboost>=2.0.0,<3.0.0"

      # Optional: write Firebase credentials so any script that imports
      # firebase_config can find them (not required for collect/train).
      - name: Write Firebase service account
        if: ${{ secrets.FIREBASE_SERVICE_ACCOUNT != '' }}
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/firebase_sa.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase_sa.json" >> $GITHUB_ENV

      - name: Collect recent match results from SportMonks
        env:
          SPORTMONKS_TOKEN: ${{ secrets.SPORTMONKS_API_KEY }}
        run: |
          DAYS="${{ github.event.inputs.days || '30' }}"
          echo "📥 Collecting last $DAYS days of results…"
          python scripts/collect_recent_results.py --days "$DAYS"

      - name: Retrain XGBoost models
        run: |
          echo "🧠 Retraining models…"
          cd scripts && python train.py

      - name: Check for changes
        id: changes
        run: |
          git add models/trained/ data/raw/all_matches.csv
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "✅ No model or data changes — skipping commit."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "📦 Changes detected — will commit."
          fi

      - name: Commit updated models and data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          DATE=$(date -u '+%Y-%m-%d')
          git commit -m "chore: retrain models with results up to $DATE [skip ci]"

      - name: Push to main
        if: steps.changes.outputs.changed == 'true'
        run: git push origin main
